<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 3px;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #ff6b9d;
    }

    .cell.o {
      color: #4fc3f7;
    }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.96);
    }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #restart:hover {
      background: #c73652;
    }

    #mode-btn {
      background: #0f3460;
      color: #a0c4ff;
      border: 1px solid #4fc3f7;
    }

    #mode-btn:hover {
      background: #1a4d8f;
    }

    #scores {
      display: flex;
      gap: 30px;
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #scores span {
      text-align: center;
    }

    #scores b {
      display: block;
      font-size: 1.6rem;
      color: #e0e0ff;
    }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-btn">vs CPU</button>
  </div>

  <div id="scores">
    <span>X Wins<b id="score-x">0</b></span>
    <span>Draws<b id="score-d">0</b></span>
    <span>O Wins<b id="score-o">0</b></span>
  </div>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeBtn = document.getElementById('mode-btn');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsCPU;
    let scores = { X: 0, O: 0, D: 0 };

    vsCPU = false;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: 'draw' };
      return null;
    }

    function applyMove(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          status.textContent = "It's a draw!";
          scores.D++;
          scoreD.textContent = scores.D;
        } else {
          status.textContent = `${result.winner} wins!`;
          result.line.forEach(idx => cells[idx].classList.add('win'));
          scores[result.winner]++;
          scoreX.textContent = scores.X;
          scoreO.textContent = scores.O;
        }
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }

    // Minimax for unbeatable CPU
    function minimax(b, isMax) {
      const res = checkWinnerFor(b);
      if (res === 'O') return 10;
      if (res === 'X') return -10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = null;
          }
        }
        return best;
      }
    }

    function checkWinnerFor(b) {
      for (const [a, x, c] of WINS) {
        if (b[a] && b[a] === b[x] && b[a] === b[c]) return b[a];
      }
      return null;
    }

    function cpuMove() {
      let bestVal = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const val = minimax(board, false);
          board[i] = null;
          if (val > bestVal) { bestVal = val; bestMove = i; }
        }
      }
      applyMove(bestMove);
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.i);
        if (gameOver || board[i]) return;
        if (vsCPU && current === 'O') return;
        applyMove(i);
        if (!gameOver && vsCPU && current === 'O') {
          status.textContent = "CPU is thinking...";
          setTimeout(cpuMove, 300);
        }
      });
    });

    restartBtn.addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      init();
    });

    init();
  </script>
</body>
</html>
